name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release app bundle
        run: npm run tauri:build

      - name: Locate DMG
        id: dmg
        run: |
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" -maxdepth 1 | head -n 1)
          STABLE_PATH="$(dirname "$DMG_PATH")/Sony-eBook-Library-Revival-macOS.dmg"
          cp "$DMG_PATH" "$STABLE_PATH"
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "stable_path=$STABLE_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        run: cp .github/release-notes.md /tmp/release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.dmg.outputs.stable_path }}
          body_path: /tmp/release-notes.md
          generate_release_notes: true
